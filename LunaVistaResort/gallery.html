<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZitowResort | Gallery</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
	<img src="zitowresorttransparent.png" alt="ZitowResort Logo" class="logo">
	ZitowResort
	</a>
    <nav aria-label="Primary">
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="aboutus.html">About ZitowResort</a></li>
        <li><a href="reservation.html">Reservation</a></li>
      </ul>
    </nav>
  </header>

  <section class="gallery">
  <h2>Gallery</h2>

	<section class="carousel-card" id="gallery" aria-label="Resort highlights">
      <div class="carousel">
        <div class="slide active">
          <img src="room1.jpg" alt="Luxury suite with ocean view">
        </div>
        <div class="slide">
          <img src="room2.jpeg" alt="Resort pool during sunset">
        </div>
        <div class="slide">
          <img src="room3.webp" alt="Beachfront dinner setup">
        </div>

        <button class="carousel-btn prev" type="button" aria-label="Previous image">&#10094;</button>
        <button class="carousel-btn next" type="button" aria-label="Next image">&#10095;</button>
      </div>

      <div class="dots" aria-label="Select image">
        <button class="dot active" type="button" aria-label="Show first image"></button>
        <button class="dot" type="button" aria-label="Show second image"></button>
        <button class="dot" type="button" aria-label="Show third image"></button>
      </div>
    </section>

  <div class="gallery-container">
    <img src="room1.jpg" alt="Resort View 1">
    <img src="room2.jpeg" alt="Resort View 2">
	<img src="room3.webp" alt="Resort View 2">
  </div>
  </section>

  <footer class="site-footer">
    <p> © 2026 ZitowResort. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
